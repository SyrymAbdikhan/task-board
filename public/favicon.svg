<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Indigo background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>

  <!-- Left column — 2 cards -->
  <rect x="4"  y="7"  width="7" height="3.5" rx="1.5" fill="white" opacity="0.95"/>
  <rect x="4"  y="12" width="7" height="3.5" rx="1.5" fill="white" opacity="0.6"/>

  <!-- Middle column — 3 cards -->
  <rect x="12.5" y="7"  width="7" height="3.5" rx="1.5" fill="white" opacity="0.95"/>
  <rect x="12.5" y="12" width="7" height="3.5" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="12.5" y="17" width="7" height="3.5" rx="1.5" fill="white" opacity="0.3"/>

  <!-- Right column — 1 card -->
